name: CI/CD Pipeline

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
    branches: [master]

# Determine RTE based on ref
env:
  RTE: ${{ startsWith(github.ref, 'refs/tags/v') && 'prod' || github.ref == 'refs/heads/master' && 'test' || 'dev' }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ── STAGE: static ──────────────────────────────────────────────────────────

  static-frontend:
    name: "Static · Frontend"
    runs-on: ubuntu-latest
    environment: ${{ startsWith(github.ref, 'refs/tags/v') && 'env-prod' || github.ref == 'refs/heads/master' && 'env-test' || 'env-dev' }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test coverage
        run: npm run test:coverage -- --watchAll=false --silent

      - name: Type check
        run: npx tsc --noEmit

  static-backend:
    name: "Static · Backend"
    runs-on: ubuntu-latest
    environment: ${{ startsWith(github.ref, 'refs/tags/v') && 'env-prod' || github.ref == 'refs/heads/master' && 'env-test' || 'env-dev' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install static-analysis tools
        run: pip install flake8 black pip-audit

      - name: Dependency vulnerability audit
        run: pip-audit -r backend/requirements.txt

      - name: Format check
        run: black --check backend/

      - name: Lint
        run: flake8 --config backend/.flake8 backend/

  # ── STAGE: build ───────────────────────────────────────────────────────────

  build-frontend:
    name: "Build · Frontend"
    runs-on: ubuntu-latest
    needs: [static-frontend]
    environment: ${{ startsWith(github.ref, 'refs/tags/v') && 'env-prod' || github.ref == 'refs/heads/master' && 'env-test' || 'env-dev' }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  build-backend:
    name: "Build · Backend"
    runs-on: ubuntu-latest
    needs: [static-backend]
    environment: ${{ startsWith(github.ref, 'refs/tags/v') && 'env-prod' || github.ref == 'refs/heads/master' && 'env-test' || 'env-dev' }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase owner
        run: echo "OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Build Docker image
        run: docker build -t di-portal-backend:${{ github.sha }} ./backend

      - name: Push to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker tag di-portal-backend:${{ github.sha }} ghcr.io/${{ env.OWNER }}/di-portal-backend:${{ github.sha }}
          docker push ghcr.io/${{ env.OWNER }}/di-portal-backend:${{ github.sha }}

  # ── STAGE: security ────────────────────────────────────────────────────────

  security-scan:
    name: "Security · Container Scan"
    runs-on: ubuntu-latest
    needs: [build-backend]
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase owner
        run: echo "OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ env.OWNER }}/di-portal-backend:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL

  # ── STAGE: deploy ──────────────────────────────────────────────────────────

  deploy:
    name: "Deploy · Render"
    runs-on: ubuntu-latest
    needs: [build-frontend, security-scan]
    if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
    environment: ${{ startsWith(github.ref, 'refs/tags/v') && 'env-prod' || 'env-test' }}
    steps:
      - name: Deploy backend to Render
        run: curl -f -X POST "${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}"

      - name: Deploy frontend to Render
        run: curl -f -X POST "${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}"
