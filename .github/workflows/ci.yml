name: CI/CD Pipeline

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
    branches: [master]

# Determine RTE based on ref
env:
  RTE: ${{ startsWith(github.ref, 'refs/tags/v') && 'prod' || github.ref == 'refs/heads/master' && 'test' || 'dev' }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ── STAGE: static ──────────────────────────────────────────────────────────

  static-frontend:
    name: "Static · Frontend"
    runs-on: ubuntu-latest
    environment: ${{ startsWith(github.ref, 'refs/tags/v') && 'env-prod' || github.ref == 'refs/heads/master' && 'env-test' || 'env-dev' }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test coverage
        run: npm run test:coverage -- --watchAll=false --silent

      - name: Type check
        run: npx tsc --noEmit

  static-backend:
    name: "Static · Backend"
    runs-on: ubuntu-latest
    environment: ${{ startsWith(github.ref, 'refs/tags/v') && 'env-prod' || github.ref == 'refs/heads/master' && 'env-test' || 'env-dev' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install static-analysis tools
        run: pip install flake8 black pip-audit

      - name: Dependency vulnerability audit
        run: pip-audit -r backend/requirements.txt

      - name: Format check
        run: black --check backend/

      - name: Lint
        run: flake8 --config backend/.flake8 backend/

  # ── STAGE: build ───────────────────────────────────────────────────────────

  build-frontend:
    name: "Build · Frontend"
    runs-on: ubuntu-latest
    needs: [static-frontend]
    environment: ${{ startsWith(github.ref, 'refs/tags/v') && 'env-prod' || github.ref == 'refs/heads/master' && 'env-test' || 'env-dev' }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  build-backend:
    name: "Build · Backend"
    runs-on: ubuntu-latest
    needs: [static-backend]
    environment: ${{ startsWith(github.ref, 'refs/tags/v') && 'env-prod' || github.ref == 'refs/heads/master' && 'env-test' || 'env-dev' }}
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t di-portal-backend:${{ github.sha }} ./backend

      # Uncomment when GHCR secrets are configured:
      # - name: Push to GitHub Container Registry
      #   run: |
      #     echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      #     docker tag di-portal-backend:${{ github.sha }} ghcr.io/${{ github.repository_owner }}/di-portal-backend:${{ github.sha }}
      #     docker push ghcr.io/${{ github.repository_owner }}/di-portal-backend:${{ github.sha }}

  # ── STAGE: security ────────────────────────────────────────────────────────

  security-scan:
    name: "Security · Container Scan"
    runs-on: ubuntu-latest
    needs: [build-backend]
    # Activate when GHCR push is enabled so Trivy can pull the image
    if: false
    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Scan image
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            ghcr.io/${{ github.repository_owner }}/di-portal-backend:${{ github.sha }}

  # ── STAGE: deploy ──────────────────────────────────────────────────────────

  deploy:
    name: "Deploy · Production"
    runs-on: ubuntu-latest
    needs: [security-scan]
    # Activate when deployment target is decided
    if: startsWith(github.ref, 'refs/tags/v') && false
    environment: env-prod
    steps:
      - uses: actions/checkout@v4
      # Deployment steps to be added when target platform is decided
